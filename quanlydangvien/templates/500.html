<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Lỗi máy chủ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c4001a;
            --foreground: #0f172a;
            --muted: #64748b;
            --background: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            animation: fadeIn 0.6s ease-out;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--muted);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.2;
        }
        .icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(196, 0, 26, 0.2);
            border: none;
            cursor: pointer;
        }
        .btn-secondary {
            background-color: white;
            color: var(--foreground);
            border: 1px solid var(--muted);
            box-shadow: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <div class="error-code">500</div>
        <h1>Lỗi hệ thống</h1>
        <p>Đã xảy ra lỗi không mong muốn phía máy chủ. Chúng tôi đang kiểm tra và sẽ sớm khắc phục sự cố này.</p>
        <div class="btn-group">
            <button onclick="window.location.reload()" class="btn">Thử lại</button>
            <a href="/" class="btn btn-secondary">Về trang chủ</a>
        </div>
    </div>
</body>
</html>
